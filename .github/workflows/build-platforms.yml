# build-platforms.yml — Phase D desktop artifact builds.
#
# Builds a REAL macOS .dmg (Apple Silicon + Intel) for the Wails v3 app
# (cmd/desktop, jetstream tag so the Leaf Node edge-sync is compiled in) on
# every push to master and on PRs, and uploads it as a release artifact.
#
# Windows and Linux are intentionally NOT built here — developers build them
# locally with the wails CLI (see README "Desktop & Mobile"). Keeping the CI
# to macOS only keeps the pipeline lean. The full test/lint gate (including
# the collab e2e guards) runs in ci.yml — a green CI is a prerequisite for a
# trustworthy desktop binary, so we don't duplicate tests here.

name: Build Desktop Platforms

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-latest
            artifact: gogogo-desktop-darwin-amd64
          - arch: arm64
            runner: macos-latest
            artifact: gogogo-desktop-darwin-arm64
    runs-on: ${{ matrix.runner }}
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - name: Install Go 1.26.5 manually
        # actions/setup-go extracts the toolchain via tar and has been
        # intermittently corrupting it on this runner image. Install the
        # official stable tarball from go.dev instead (per-OS/arch).
        shell: bash
        run: |
          detected_os=$(uname -s | tr '[:upper:]' '[:lower:]')
          detected_arch=$(uname -m)
          case "$detected_arch" in
            x86_64|amd64) go_arch=amd64 ;;
            aarch64|arm64) go_arch=arm64 ;;
            *) echo "Unknown arch: $detected_arch"; exit 1 ;;
          esac
          case "$detected_os" in
            darwin) go_os=darwin ;;
            linux) go_os=linux ;;
            *) echo "Unknown OS: $detected_os"; exit 1 ;;
          esac
          curl -fsSL "https://go.dev/dl/go1.26.5.${go_os}-${go_arch}.tar.gz" -o /tmp/go.tgz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo '/usr/local/go/bin' >> "$GITHUB_PATH"
          /usr/local/go/bin/go version

      - name: Generate templ
        run: go tool templ generate
        shell: bash

      - name: Build macOS .app + .dmg
        # Assemble a real, mountable macOS installer: the wails v3 binary
        # wrapped in a .app bundle, then a .dmg via hdiutil (built into
        # macOS). Done by hand rather than `wails3 package` so the step is
        # deterministic and does not depend on the alpha CLI being published
        # for this Wails version.
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          BIN="build/gogogo-desktop-darwin-${ARCH}"
          APP="build/Gogogo.app"
          DMG="build/${{ matrix.artifact }}.dmg"

          go build -tags jetstream -o "$BIN" ./cmd/desktop

          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/gogogo-desktop"
          cp cmd/desktop/Info.plist "$APP/Contents/Info.plist"

          hdiutil create -volname Gogogo -srcfolder "$APP" -ov "$DMG"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}.dmg
          path: |
            build/${{ matrix.artifact }}.dmg
          if-no-files-found: warn
