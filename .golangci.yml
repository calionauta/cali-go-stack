version: "2"
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - gocritic
    - ineffassign
    - unused
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      severity: medium
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return
        - name: context-as-argument
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - "_test.go"
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
